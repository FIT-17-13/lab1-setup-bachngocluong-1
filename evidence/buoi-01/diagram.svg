<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- System boundary -->
  <rect x="240" y="24" width="416" height="412" rx="16" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="7 4"/>
  <text x="448" y="14" text-anchor="middle" font-size="11" fill="#888780">System boundary — Nhóm 3 - WL</text>

  <!-- Camera Stream -->
  <rect x="24" y="60" width="172" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="110" y="82" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Camera Stream</text>

  <!-- Core Business -->
  <rect x="24" y="208" width="172" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="110" y="230" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Core Business</text>

  <!-- AI Admin -->
  <rect x="24" y="356" width="172" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="110" y="378" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">AI Admin</text>

  <!-- API Gateway -->
  <rect x="272" y="178" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="352" y="198" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">API Gateway</text>
  <text x="352" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">/ Endpoints</text>

  <!-- AI Vision Core -->
  <rect x="488" y="134" width="152" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="564" y="154" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">AI Vision Core</text>
  <text x="564" y="174" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Detection engine</text>

  <!-- Log Database -->
  <rect x="488" y="280" width="152" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="564" y="300" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Log Database</text>
  <text x="564" y="320" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Persistent storage</text>

  <!-- Camera Stream → API -->
  <path d="M196 82 L248 82 L248 192 L270 192" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="222" y="74" text-anchor="middle" font-size="11" fill="#888780">POST /detect</text>

  <!-- API → Camera Stream (response) -->
  <path d="M272 192 L248 192 L248 106 L196 106" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Core Business → API -->
  <path d="M196 230 L270 230" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="233" y="222" text-anchor="middle" font-size="11" fill="#888780">GET /detections</text>

  <!-- API → Core Business (response) -->
  <path d="M272 216 L232 216 L232 252 L196 252" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- AI Admin → API -->
  <path d="M196 378 L248 378 L248 222 L270 222" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="222" y="396" text-anchor="middle" font-size="11" fill="#888780">GET /health</text>

  <!-- API → AI Vision Core -->
  <path d="M432 196 L486 172" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <!-- AI Vision Core → API -->
  <path d="M486 184 L432 208" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- AI Vision Core → Log Database -->
  <path d="M564 190 L564 278" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="576" y="238" font-size="11" fill="#888780">log</text>

  <!-- Legend -->
  <line x1="272" y1="442" x2="306" y2="442" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="312" y="446" font-size="11" fill="#888780">Request</text>
  <line x1="390" y1="442" x2="424" y2="442" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="430" y="446" font-size="11" fill="#888780">JSON response</text>
</svg>
